<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- stem -->
  <line x1="50" y1="18" x2="50" y2="8" stroke="#4a7c3f" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="12" x2="43" y2="6" stroke="#4a7c3f" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="12" x2="57" y2="6" stroke="#4a7c3f" stroke-width="2" stroke-linecap="round"/>

  <!-- drupelets — raspberry shape: cluster of circles -->
  <!-- top row -->
  <circle cx="38" cy="30" r="11" fill="#c0175d"/>
  <circle cx="62" cy="30" r="11" fill="#c0175d"/>
  <!-- middle row -->
  <circle cx="26" cy="48" r="11" fill="#c0175d"/>
  <circle cx="50" cy="44" r="12" fill="#c0175d"/>
  <circle cx="74" cy="48" r="11" fill="#c0175d"/>
  <!-- lower-middle row -->
  <circle cx="34" cy="66" r="11" fill="#c0175d"/>
  <circle cx="66" cy="66" r="11" fill="#c0175d"/>
  <!-- bottom -->
  <circle cx="50" cy="76" r="11" fill="#c0175d"/>

  <!-- drupelet highlights -->
  <circle cx="35" cy="27" r="3.5" fill="#e8559a" opacity="0.6"/>
  <circle cx="59" cy="27" r="3.5" fill="#e8559a" opacity="0.6"/>
  <circle cx="23" cy="45" r="3.5" fill="#e8559a" opacity="0.6"/>
  <circle cx="47" cy="41" r="3.5" fill="#e8559a" opacity="0.6"/>
  <circle cx="71" cy="45" r="3.5" fill="#e8559a" opacity="0.6"/>
  <circle cx="31" cy="63" r="3.5" fill="#e8559a" opacity="0.6"/>
  <circle cx="63" cy="63" r="3.5" fill="#e8559a" opacity="0.6"/>
  <circle cx="47" cy="73" r="3.5" fill="#e8559a" opacity="0.6"/>
</svg>
